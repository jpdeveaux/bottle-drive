services:
  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: ./backend
      target: runner
      args:
        - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}?schema=public
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:${DB_PORT}/${DB_NAME}?schema=public
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      target: production
      args:
        - VITE_TITLE=${VITE_TITLE}
        - VITE_DATE_TIME=${VITE_DATE_TIME}
        - VITE_API_URL=${VITE_API_URL}
        - VITE_MAP_CENTER_LAT=${VITE_MAP_CENTER_LAT}
        - VITE_MAP_CENTER_LNG=${VITE_MAP_CENTER_LNG}
        - VITE_MAP_ZOOM=${VITE_MAP_ZOOM}
        - VITE_ADDRESS_PLACEHOLDER=${VITE_ADDRESS_PLACEHOLDER}
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api      

volumes:
  postgres_data:
